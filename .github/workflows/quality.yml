name: Production quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.0
      - name: Activate the pinned pnpm release
        run: npm install --global --ignore-scripts pnpm@11.9.0
      - run: pnpm install --frozen-lockfile
      - name: Reject tracked credentials and private keys
        run: pnpm security:secrets
      - name: Reject vulnerable dependency trees
        run: pnpm security:audit
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:render
      - run: pnpm build:vercel

  tenant-isolation:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
      TEST_PROJECT_A_ID: ${{ secrets.TEST_PROJECT_A_ID }}
      TEST_PROJECT_B_ID: ${{ secrets.TEST_PROJECT_B_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.0
      - name: Activate the pinned pnpm release
        run: npm install --global --ignore-scripts pnpm@11.9.0
      - run: pnpm install --frozen-lockfile
      - name: Require disposable tenant-isolation fixture
        run: |
          test -n "$TEST_SUPABASE_URL"
          test -n "$TEST_SUPABASE_ANON_KEY"
          test -n "$TEST_USER_A_EMAIL"
          test -n "$TEST_USER_A_PASSWORD"
          test -n "$TEST_PROJECT_A_ID"
          test -n "$TEST_PROJECT_B_ID"
      - run: pnpm vitest run tests/supabase-isolation.integration.test.ts

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
