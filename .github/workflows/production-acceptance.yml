name: Production acceptance

on:
  workflow_run:
    workflows: ["Production quality gates"]
    types: [completed]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-acceptance
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.0
      - name: Wait for the matching Vercel release and test production boundaries
        env:
          HDSEO_ACCEPTANCE_ORIGIN: https://hdseo.vercel.app
          HDSEO_EXPECTED_RELEASE: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: node tests/production-smoke.mjs
